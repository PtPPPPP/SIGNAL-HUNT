name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel a superseded run when a PR is updated mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: lint + typecheck + unit tests + build. If this is red there is no
  # point spending time on the heavier Playwright job, so e2e depends on it.
  build:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 20 is the Vite 7 minimum LTS (Vite 7 requires Node 20.19+ / 22.12+).
      # The project has no `engines` pin yet; 20 LTS is the safe floor.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit / integration tests
        run: npm test -- --run

      - name: Build
        run: npm run build

  # Real-browser E2E. Runs only after the build gate is green. Uploads traces /
  # screenshots / videos only on failure (retention 7 days) so a red run is
  # debuggable without permanently storing large artifacts.
  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results
            playwright-report
          retention-days: 7
